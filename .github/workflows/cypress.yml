name: Cypress Tests

# ─────────────────────────────────────────────────────────────────────────────
# When this runs:
#   pull_request  → smoke tests only  (fast feedback on every PR)
#   push to main  → smoke + full E2E  (full gate on merge)
#   workflow_dispatch → manual run with environment selector
#
# Environment matrix:
#   PR            → configFile=dev   (smoke only)
#   merge to main → configFile=qa    (smoke + e2e)
#   manual        → configFile=<selected>
#
# Adapting to AWS CodeBuild:
#   See buildspec.yml in the FHF reference project for parallel Cypress Cloud
#   execution, AWS Secrets Manager credential loading, TestRail upload,
#   and Mochawesome report merging across parallel workers.
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "cypress/**"
      - "package.json"
      - "cypress.config.js"
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, qa, prod]
      test_scope:
        description: "Test scope"
        required: true
        default: "smoke"
        type: choice
        options: [smoke, e2e, all]

env:
  NODE_VERSION: "20"

jobs:
  # ── Job 1: Smoke tests — runs on every PR and every push ──────────────────
  smoke:
    name: Smoke — ${{ github.event.inputs.environment || (github.event_name == 'push' && 'qa') || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.event_name == 'push' && 'qa') || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Write cypress.env.json
        # Reads from GitHub Secrets — set these in repo Settings > Secrets > Actions
        # Secret names must match: BASE_URL, CYPRESS_USERNAME, CYPRESS_PASSWORD, CYPRESS_AUTH_URL
        run: |
          cat > cypress.env.json << EOF
          {
            "baseUrl": "${{ secrets.BASE_URL }}",
            "username": "${{ secrets.CYPRESS_USERNAME }}",
            "password": "${{ secrets.CYPRESS_PASSWORD }}",
            "authUrl": "${{ secrets.CYPRESS_AUTH_URL }}"
          }
          EOF

      - name: Run smoke tests
        uses: cypress-io/github-action@v6
        with:
          command: npm run cy:run:smoke
        env:
          CYPRESS_CONFIG_FILE: ${{ github.event.inputs.environment || (github.event_name == 'push' && 'qa') || 'dev' }}

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure-artifacts-${{ github.run_id }}
          path: |
            cypress/screenshots/
            cypress/videos/
          retention-days: 7

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_id }}
          path: reports/
          retention-days: 14

  # ── Job 2: Full E2E — runs only on push to main ───────────────────────────
  e2e:
    name: E2E — ${{ github.event.inputs.environment || 'qa' }}
    runs-on: ubuntu-latest
    needs: smoke
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_scope == 'e2e' || github.event.inputs.test_scope == 'all'))
    environment: ${{ github.event.inputs.environment || 'qa' }}

    strategy:
      # Run modules in parallel — add more matrix entries as your suite grows
      # Each entry runs as a separate GitHub Actions runner in parallel
      fail-fast: false
      matrix:
        module: [smoke, e2e]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Write cypress.env.json
        run: |
          cat > cypress.env.json << EOF
          {
            "baseUrl": "${{ secrets.BASE_URL }}",
            "username": "${{ secrets.CYPRESS_USERNAME }}",
            "password": "${{ secrets.CYPRESS_PASSWORD }}",
            "authUrl": "${{ secrets.CYPRESS_AUTH_URL }}"
          }
          EOF

      - name: Run ${{ matrix.module }} tests
        uses: cypress-io/github-action@v6
        with:
          command: npx cypress run --spec "cypress/tests/**/${{ matrix.module }}/**/*.cy.js"
        env:
          CYPRESS_CONFIG_FILE: ${{ github.event.inputs.environment || 'qa' }}
          # Uncomment to enable Cypress Cloud recording:
          # CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.module }}-failure-${{ github.run_id }}
          path: |
            cypress/screenshots/
            cypress/videos/
          retention-days: 7

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.module }}-report-${{ github.run_id }}
          path: reports/
          retention-days: 14
